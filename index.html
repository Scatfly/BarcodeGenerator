<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CodeForge — barcode generator</title>
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#1c2230">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CodeForge">
<link rel="apple-touch-icon" href="./icon-180.png">
<link rel="icon" type="image/png" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
<style>
  :root {
    --paper: #f2efe6;
    --panel: #fbfaf5;
    --ink: #1c2230;
    --ink-soft: #5a6276;
    --line: #d6d2c4;
    --scan: #e8482b;
    --scan-soft: #f8d9d1;
    --grid: #e6e2d6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: "IBM Plex Mono", monospace;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 28px 28px; min-height: 100vh;
  }
  .wrap { max-width: 1040px; margin: 0 auto; padding: 32px 20px 64px;
    padding-left: max(20px, env(safe-area-inset-left)); padding-right: max(20px, env(safe-area-inset-right));
    padding-top: max(32px, env(safe-area-inset-top)); }
  header { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; margin-bottom: 4px; }
  .logo { font-family: "Space Grotesk", sans-serif; font-weight: 700; font-size: 30px; letter-spacing: -0.02em; }
  .logo b { color: var(--scan); }
  .tag { color: var(--ink-soft); font-size: 12px; text-transform: uppercase; letter-spacing: 0.18em; }
  .rule { height: 2px; background: var(--ink); margin: 14px 0 24px; }
  .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  @media (max-width: 760px) { .layout { grid-template-columns: 1fr; }
    .panel { box-shadow: 4px 4px 0 var(--ink); }
    .wrap { padding-bottom: 48px; }
    .btn { flex: 1 1 auto; }
  }
  .panel { background: var(--panel); border: 2px solid var(--ink); border-radius: 2px; box-shadow: 6px 6px 0 var(--ink); padding: 20px; }
  .panel h2 { font-family: "Space Grotesk", sans-serif; font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; margin: 0 0 16px; display: flex; align-items: center; gap: 8px; }
  .panel h2 .num { background: var(--ink); color: var(--paper); font-size: 11px; padding: 2px 7px; border-radius: 2px; }
  label { display: block; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-soft); margin: 0 0 6px; }
  .field { margin-bottom: 18px; }
  textarea, input[type=text], input[type=number], select {
    width: 100%; font-family: "IBM Plex Mono", monospace; font-size: 16px; color: var(--ink);
    background: #fff; border: 1.5px solid var(--line); border-radius: 2px; padding: 10px 11px;
  }
  textarea { resize: vertical; min-height: 78px; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--scan); box-shadow: 0 0 0 3px var(--scan-soft); }
  .seg { display: flex; border: 1.5px solid var(--ink); border-radius: 2px; overflow: hidden; }
  .seg button { flex: 1; font-family: "IBM Plex Mono", monospace; font-size: 13px; font-weight: 500; padding: 10px; background: #fff; border: none; cursor: pointer; color: var(--ink-soft); border-right: 1.5px solid var(--ink); }
  .seg button:last-child { border-right: none; }
  .seg button.on { background: var(--ink); color: var(--paper); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .row3 { display: grid; grid-template-columns: 1.2fr 0.9fr 0.9fr; gap: 12px; }
  .slider-row { display: flex; align-items: center; gap: 12px; }
  input[type=range] { flex: 1; accent-color: var(--scan); }
  .val { font-size: 13px; font-weight: 600; min-width: 56px; text-align: right; }
  .opt-block { display: none; }
  .opt-block.show { display: block; }
  .px-note { font-size: 11px; color: var(--ink-soft); margin-top: -10px; margin-bottom: 16px; letter-spacing: 0.04em; }
  .px-note b { color: var(--scan); font-weight: 600; }
  .dpi-wrap.muted { opacity: 0.4; pointer-events: none; }
  .stage { position: relative; display: flex; align-items: center; justify-content: center; min-height: 300px;
    background: repeating-linear-gradient(45deg, #f4f1e8 0 10px, #efece2 10px 20px); border: 1.5px solid var(--line); border-radius: 2px; padding: 24px; overflow: hidden; }
  #output { display: inline-block; line-height: 0; background: #fff; max-width: 100%; }
  #output canvas, #output img, #output svg { display: block; max-width: 100%; height: auto; }
  .scanline { position: absolute; left: 0; right: 0; height: 2px; background: var(--scan); box-shadow: 0 0 12px 2px var(--scan); opacity: 0; pointer-events: none; }
  .stage.busy .scanline { animation: scan 0.7s ease-in-out; }
  @keyframes scan { 0%{top:0;opacity:0.9} 100%{top:100%;opacity:0} }
  @media (prefers-reduced-motion: reduce) { .stage.busy .scanline { animation: none; } }
  .readout { margin-top: 14px; font-size: 11px; color: var(--ink-soft); letter-spacing: 0.06em; word-break: break-all; }
  .readout span { color: var(--ink); }
  .actions { display: flex; gap: 12px; margin-top: 18px; flex-wrap: wrap; }
  .btn { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 13px; letter-spacing: 0.04em; padding: 12px 18px; border-radius: 2px; cursor: pointer; border: 2px solid var(--ink); }
  .btn-primary { background: var(--scan); color: #fff; border-color: var(--scan); flex: 1; }
  .btn-primary:hover { filter: brightness(1.05); }
  .btn-ghost { background: #fff; color: var(--ink); }
  .btn-ghost:hover { background: var(--ink); color: var(--paper); }
  .err { color: var(--scan); font-size: 12px; margin-top: 10px; min-height: 16px; }
  #saveHint { margin-top: 16px; padding-top: 16px; border-top: 1.5px dashed var(--line); }
  .save-img { display: block; max-width: 100%; border: 1.5px solid var(--ink); border-radius: 2px; background: #fff; }
  .save-msg { font-size: 11px; color: var(--ink-soft); letter-spacing: 0.04em; line-height: 1.5; margin: 10px 0 0; }
  .save-msg b { color: var(--scan); }
  .print-tip { font-size: 11px; color: var(--ink-soft); letter-spacing: 0.04em; line-height: 1.5; margin: 10px 0 0; }
  .print-tip b { color: var(--ink); }
  /* print-only: hide the UI, show just the code at true CSS size */
  #printArea { display: none; }
  @media print {
    body { background: #fff !important; background-image: none !important; }
    .wrap { display: none !important; }
    #printArea { display: block !important; position: absolute; left: 0; top: 0; margin: 0; padding: 0; }
    #printArea img { display: block; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">Code<b>Forge</b></div>
    <div class="tag">data → machine-readable</div>
  </header>
  <div class="rule"></div>

  <div class="layout">
    <!-- LEFT: controls -->
    <div class="panel">
      <h2><span class="num">01</span> Payload &amp; format</h2>

      <div class="field">
        <label for="data">Data to encode</label>
        <textarea id="data" placeholder="Type a URL, text, or any string…">https://github.com/scatfly/Bullet-FPS</textarea>
      </div>

      <div class="field">
        <label>Symbology</label>
        <div class="seg" id="typeSeg">
          <button data-type="qr" class="on">QR code (2D)</button>
          <button data-type="code128">Barcode (1D)</button>
        </div>
      </div>

      <!-- shared units + DPI -->
      <div class="row dpi-wrap" id="unitsRow">
        <div class="field">
          <label>Measurement unit</label>
          <select id="unit">
            <option value="px">Pixels (px)</option>
            <option value="in">Inches (in)</option>
            <option value="cm">Centimeters (cm)</option>
            <option value="mm">Millimeters (mm)</option>
          </select>
        </div>
        <div class="field dpi-wrap muted" id="dpiField">
          <label>Print resolution (DPI)</label>
          <select id="dpi">
            <option value="96">96 — screen</option>
            <option value="150">150 — draft print</option>
            <option value="203">203 — thermal label</option>
            <option value="300" selected>300 — print</option>
            <option value="600">600 — high-res</option>
            <option value="custom">Custom…</option>
          </select>
          <input type="number" id="dpiCustom" min="1" max="2400" step="1" value="203"
                 placeholder="e.g. 203" style="display:none;margin-top:8px">
        </div>
      </div>

      <!-- QR options -->
      <div class="opt-block show" id="qrOpts">
        <div class="field">
          <label>Size (<span class="uLbl">px</span>)</label>
          <div class="slider-row">
            <input type="number" id="qrSize" min="0.1" step="0.1" value="256">
          </div>
        </div>
        <div class="px-note" id="qrPxNote"></div>
        <div class="row">
          <div class="field">
            <label>Error correction</label>
            <select id="qrEcc">
              <option value="L">L — 7% (most data)</option>
              <option value="M" selected>M — 15%</option>
              <option value="Q">Q — 25%</option>
              <option value="H">H — 30% (toughest)</option>
            </select>
          </div>
          <div class="field">
            <label>Quiet-zone margin</label>
            <select id="qrMargin">
              <option value="0">None</option>
              <option value="2">Small</option>
              <option value="4" selected>Standard</option>
              <option value="8">Wide</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="field"><label>Foreground</label><input type="color" id="qrDark" value="#1c2230" style="height:40px;padding:4px;cursor:pointer"></div>
          <div class="field"><label>Background</label><input type="color" id="qrLight" value="#ffffff" style="height:40px;padding:4px;cursor:pointer"></div>
        </div>
      </div>

      <!-- Barcode (1D) options -->
      <div class="opt-block" id="barOpts">
        <div class="field">
          <label>Linear format</label>
          <select id="barFormat">
            <option value="CODE128">Code 128 — any text/numbers</option>
            <option value="EAN13">EAN-13 — 12 digits</option>
            <option value="UPC">UPC-A — 11 digits</option>
            <option value="UPCE">UPC-E — 6 digits</option>
          </select>
        </div>
        <div class="px-note" id="barFmtHint"></div>
        <div class="field">
          <label>Bar thickness — <span id="barWOut">2</span></label>
          <div class="slider-row">
            <input type="range" id="barWidth" min="1" max="8" step="1" value="2">
            <span class="val" id="barWVal">2</span>
          </div>
        </div>
        <div class="field">
          <label>Height (<span class="uLbl">px</span>)</label>
          <input type="number" id="barHeight" min="0.1" step="0.1" value="100">
        </div>
        <div class="px-note" id="barPxNote"></div>
        <div class="field">
          <label><input type="checkbox" id="barText" checked style="width:auto;margin-right:6px"> Show text under bars</label>
        </div>
      </div>

      <div class="err" id="err"></div>
    </div>

    <!-- RIGHT: output -->
    <div class="panel">
      <h2><span class="num">02</span> Generated code</h2>
      <div class="stage" id="stage">
        <div class="scanline"></div>
        <div id="output"></div>
      </div>
      <div class="readout">payload · <span id="charCount">0</span> chars · <span id="fmtLabel">QR</span> · <span id="physLabel">—</span></div>
      <div class="actions">
        <button class="btn btn-primary" id="dlPng">Download PNG</button>
        <button class="btn btn-ghost" id="printBtn">Print at actual size</button>
        <button class="btn btn-ghost" id="copyData">Copy</button>
      </div>
      <p class="print-tip" id="printTip">When the print dialog opens, set scale to <b>100% / Actual size</b> and turn off &ldquo;fit to page.&rdquo; Use inches/cm (not px) for true physical size.</p>
      <div id="saveHint" style="display:none"></div>
    </div>
  </div>
</div>

<div id="printArea"></div>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("./sw.js").catch(function () {});
    });
  }
</script>
<script>
(function () {
  var state = { type: "qr" };
  var $ = function (id) { return document.getElementById(id); };

  // unit -> pixels
  function toPx(value, unit, dpi) {
    value = parseFloat(value) || 0;
    if (unit === "px") return Math.round(value);
    if (unit === "in") return Math.round(value * dpi);
    if (unit === "cm") return Math.round(value / 2.54 * dpi);
    if (unit === "mm") return Math.round(value / 25.4 * dpi);
    return Math.round(value);
  }
  function unit() { return $("unit").value; }
  function dpi() {
    var v = $("dpi").value;
    if (v === "custom") { var c = parseInt($("dpiCustom").value, 10); return (c && c > 0) ? c : 203; }
    return parseInt(v, 10);
  }
  function pxToUnitLabel(px) {
    var u = unit(), d = dpi();
    if (u === "px") return px + " px";
    var inches = px / d;
    if (u === "in") return inches.toFixed(2) + " in";
    if (u === "cm") return (inches * 2.54).toFixed(2) + " cm";
    if (u === "mm") return (inches * 25.4).toFixed(1) + " mm";
    return px + " px";
  }

  // --- type toggle ---
  $("typeSeg").addEventListener("click", function (e) {
    var b = e.target.closest("button"); if (!b) return;
    state.type = b.dataset.type;
    [].forEach.call(this.querySelectorAll("button"), function (x) { x.classList.toggle("on", x === b); });
    $("qrOpts").classList.toggle("show", state.type === "qr");
    $("barOpts").classList.toggle("show", state.type === "code128");
    render();
  });

  // --- units / dpi reactivity ---
  function syncUnitLabels() {
    var u = unit();
    [].forEach.call(document.querySelectorAll(".uLbl"), function (el) { el.textContent = u; });
    $("dpiField").classList.toggle("muted", u === "px");
  }
  $("unit").addEventListener("change", function () { syncUnitLabels(); render(); });
  $("dpi").addEventListener("change", function () {
    $("dpiCustom").style.display = (this.value === "custom") ? "block" : "none";
    render();
  });
  $("dpiCustom").addEventListener("input", render);

  $("barWidth").addEventListener("input", function () {
    $("barWVal").textContent = this.value; $("barWOut").textContent = this.value; render();
  });

  var BAR_META = {
    CODE128: { name: "Code 128", hint: "Any text or numbers, variable length.", need: "standard text characters", sample: "CODEFORGE-001" },
    EAN13:   { name: "EAN-13",   hint: "Enter 12 digits — the 13th check digit is added automatically (13 digits also OK).", need: "exactly 12 or 13 digits", sample: "012345678905" },
    UPC:     { name: "UPC-A",    hint: "Enter 11 digits — the 12th check digit is added automatically (12 digits also OK).", need: "exactly 11 or 12 digits", sample: "03600029145" },
    UPCE:    { name: "UPC-E",    hint: "Compressed UPC: enter 6 digits, or a full 8-digit UPC-E code.", need: "exactly 6 or 8 digits", sample: "123456" }
  };
  function barFmt() { return $("barFormat").value; }
  function validForFormat(fmt, data) {
    if (fmt === "EAN13") return /^\d{12,13}$/.test(data);
    if (fmt === "UPC")   return /^\d{11,12}$/.test(data);
    if (fmt === "UPCE")  return /^\d{6}$/.test(data) || /^\d{8}$/.test(data);
    return data.length > 0; // CODE128
  }
  function updateBarHint() { $("barFmtHint").textContent = BAR_META[barFmt()].hint; }
  $("barFormat").addEventListener("change", function () {
    var fmt = barFmt();
    // load a working example when the current data can't encode in a numeric format
    if (fmt !== "CODE128" && !validForFormat(fmt, $("data").value)) $("data").value = BAR_META[fmt].sample;
    updateBarHint();
    render();
  });

  ["data","qrSize","qrEcc","qrMargin","qrDark","qrLight","barHeight","barText"].forEach(function (id) {
    $(id).addEventListener("input", render);
    $(id).addEventListener("change", render);
  });

  function setErr(msg) { $("err").textContent = msg || ""; }
  function playScan() { var s = $("stage"); s.classList.remove("busy"); void s.offsetWidth; s.classList.add("busy"); }

  function render() {
    var out = $("output"); out.innerHTML = ""; setErr("");
    var data = $("data").value;
    $("charCount").textContent = data.length;
    $("fmtLabel").textContent = state.type === "qr" ? "QR" : BAR_META[barFmt()].name;

    if (!data) { setErr("Enter some data to encode."); $("physLabel").textContent = "—"; return; }

    if (state.type === "qr") {
      var sizePx = toPx($("qrSize").value, unit(), dpi());
      sizePx = Math.max(32, Math.min(4000, sizePx));
      $("qrPxNote").innerHTML = "renders at <b>" + sizePx + " × " + sizePx + " px</b>" +
        (unit() === "px" ? "" : " @ " + dpi() + " DPI");
      $("physLabel").textContent = pxToUnitLabel(sizePx) + " sq";
      var eccMap = { L: QRCode.CorrectLevel.L, M: QRCode.CorrectLevel.M, Q: QRCode.CorrectLevel.Q, H: QRCode.CorrectLevel.H };
      try {
        var pad = (+$("qrMargin").value) * Math.max(1, Math.round(sizePx / 64));
        var box = document.createElement("div");
        box.style.padding = pad + "px"; box.style.background = $("qrLight").value;
        out.appendChild(box);
        new QRCode(box, { text: data, width: sizePx, height: sizePx,
          colorDark: $("qrDark").value, colorLight: $("qrLight").value, correctLevel: eccMap[$("qrEcc").value] });
      } catch (e) {
        setErr("Too much data for a QR code at this error-correction level. Shorten it or lower correction to L.");
        return;
      }
    } else {
      var hPx = toPx($("barHeight").value, unit(), dpi());
      hPx = Math.max(20, Math.min(2000, hPx));
      $("barPxNote").innerHTML = "bars render <b>" + hPx + " px</b> tall" +
        (unit() === "px" ? "" : " @ " + dpi() + " DPI") + " · width grows with data length";
      $("physLabel").textContent = pxToUnitLabel(hPx) + " tall";
      var fmt = barFmt(), meta = BAR_META[fmt];
      var svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      out.appendChild(svg);
      var bad = false;
      try {
        JsBarcode(svg, data, { format: fmt, width: +$("barWidth").value, height: hPx,
          displayValue: $("barText").checked, lineColor: "#1c2230", background: "#ffffff",
          margin: 10, font: "IBM Plex Mono", valid: function (v) { bad = !v; } });
      } catch (e) { bad = true; }
      if (bad || !svg.querySelector("rect")) {
        out.innerHTML = "";
        if (fmt === "CODE128") {
          setErr("Code 128 can't encode that — stick to standard characters.");
        } else {
          var digits = data.replace(/\D/g, "").length;
          setErr(meta.name + " needs " + meta.need + " (you entered " + digits + ").");
        }
        return;
      }
    }
    playScan();
  }

  /* ---------- PNG physical-size metadata (pHYs chunk) ---------- */
  var crcTable = (function () {
    var t = [], c, n, k;
    for (n = 0; n < 256; n++) { c = n; for (k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1); t[n] = c >>> 0; }
    return t;
  })();
  function crc32(bytes, start, end) {
    var c = 0xFFFFFFFF;
    for (var i = start; i < end; i++) c = crcTable[(c ^ bytes[i]) & 0xFF] ^ (c >>> 8);
    return (c ^ 0xFFFFFFFF) >>> 0;
  }
  function writeUint32(arr, off, val) { arr[off]=(val>>>24)&255; arr[off+1]=(val>>>16)&255; arr[off+2]=(val>>>8)&255; arr[off+3]=val&255; }
  // insert a pHYs chunk (physical pixel dimensions) so the PNG prints at true size
  function embedDpi(uint8, d) {
    var ppm = Math.round(d / 0.0254); // pixels per metre
    var chunk = new Uint8Array(21);   // 4 len + 4 type + 9 data + 4 crc
    writeUint32(chunk, 0, 9);
    chunk[4]=0x70; chunk[5]=0x48; chunk[6]=0x59; chunk[7]=0x73; // "pHYs"
    writeUint32(chunk, 8, ppm); writeUint32(chunk, 12, ppm); chunk[16]=1; // unit = metre
    writeUint32(chunk, 17, crc32(chunk, 4, 17));
    // IHDR ends at byte 33 (8 sig + 25 IHDR chunk); insert right after
    var out = new Uint8Array(uint8.length + chunk.length);
    out.set(uint8.subarray(0, 33), 0);
    out.set(chunk, 33);
    out.set(uint8.subarray(33), 33 + chunk.length);
    return out;
  }
  function dataURLtoUint8(url) {
    var bin = atob(url.split(",")[1]); var arr = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i); return arr;
  }
  function deliverPng(bytes, name) {
    var blob = new Blob([bytes], { type: "image/png" });
    var url = URL.createObjectURL(blob);
    // 1) normal download — works when hosted on GitHub Pages or opened as a local file
    try {
      var a = document.createElement("a");
      a.href = url; a.download = name;
      document.body.appendChild(a); a.click(); a.remove();
    } catch (e) {}
    // 2) sandbox-proof fallback — show the exact PNG so it can be long-pressed / right-clicked to save
    var hint = $("saveHint"); hint.innerHTML = "";
    var img = new Image(); img.src = url; img.alt = "generated code"; img.className = "save-img";
    var p = document.createElement("p"); p.className = "save-msg";
    p.innerHTML = "Download blocked? <b>Long-press</b> (mobile) or <b>right-click</b> (desktop) the image above → <b>Save image</b>. The DPI/size metadata is preserved in the saved file.";
    hint.appendChild(img); hint.appendChild(p); hint.style.display = "block";
  }

  $("dlPng").addEventListener("click", function () {
    var canvas = $("output").querySelector("canvas");
    var svg = $("output").querySelector("svg");
    var name = (state.type === "qr" ? "qrcode" : "barcode") + "-" + Date.now() + ".png";
    var useDpi = unit() !== "px";

    if (canvas) {
      var bytes = dataURLtoUint8(canvas.toDataURL("image/png"));
      if (useDpi) bytes = embedDpi(bytes, dpi());
      deliverPng(bytes, name); return;
    }
    if (svg) {
      var xml = new XMLSerializer().serializeToString(svg);
      var img = new Image();
      img.onload = function () {
        var c = document.createElement("canvas");
        c.width = img.width || 600; c.height = img.height || 200;
        var ctx = c.getContext("2d"); ctx.fillStyle = "#fff"; ctx.fillRect(0,0,c.width,c.height); ctx.drawImage(img,0,0);
        var bytes = dataURLtoUint8(c.toDataURL("image/png"));
        if (useDpi) bytes = embedDpi(bytes, dpi());
        deliverPng(bytes, name);
      };
      img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(xml)));
      return;
    }
    setErr("Nothing to download yet — generate a code first.");
  });

  /* ---------- print at true physical size via CSS units ---------- */
  function currentPngDataURL(cb) {
    var canvas = $("output").querySelector("canvas");
    var svg = $("output").querySelector("svg");
    if (canvas) { cb(canvas.toDataURL("image/png")); return; }
    if (svg) {
      var xml = new XMLSerializer().serializeToString(svg);
      var im = new Image();
      im.onload = function () {
        var c = document.createElement("canvas");
        c.width = im.width || 600; c.height = im.height || 200;
        var ctx = c.getContext("2d"); ctx.fillStyle = "#fff"; ctx.fillRect(0,0,c.width,c.height); ctx.drawImage(im,0,0);
        cb(c.toDataURL("image/png"));
      };
      im.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(xml)));
      return;
    }
    cb(null);
  }

  $("printBtn").addEventListener("click", function () {
    currentPngDataURL(function (url) {
      if (!url) { setErr("Generate a code first."); return; }
      var u = unit();
      var w, h;
      if (state.type === "qr") {                       // square: both sides in chosen unit
        w = $("qrSize").value + u; h = $("qrSize").value + u;
      } else {                                          // barcode: fix height, width scales with data
        h = $("barHeight").value + u; w = "auto";
      }
      var area = $("printArea"); area.innerHTML = "";
      var img = new Image();
      img.onload = function () {
        try { window.print(); }
        catch (e) { setErr("Printing is blocked in this preview — open the file in a real browser tab to print."); }
      };
      img.style.display = "block"; img.style.width = w; img.style.height = h;
      area.appendChild(img);
      img.src = url;
    });
  });

  $("copyData").addEventListener("click", function () {
    navigator.clipboard && navigator.clipboard.writeText($("data").value);
    var b = this, t = b.textContent; b.textContent = "Copied!";
    setTimeout(function () { b.textContent = t; }, 1200);
  });

  syncUnitLabels();
  updateBarHint();
  render();
})();
</script>
</body>
</html>
